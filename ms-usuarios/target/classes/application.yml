server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ms-usuarios

  datasource:
    url: jdbc:postgresql://postgres-usuarios:5432/notara-usuarios-db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

  h2:
    console:
      enabled: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── Seguridad JWT ─────────────────────────────
jwt:
  secret: ${JWT_SECRET:cambia_esto_por_un_string_largo_y_seguro}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-secret: ${JWT_REFRESH_SECRET:otro_string_largo_y_seguro}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── Eureka ───────────────────────────────────
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
  instance:
    hostname: ms-usuarios
    prefer-ip-address: true

# ── Actuator ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Logging ──────────────────────────────────
logging:
  level:
    com.notara: INFO