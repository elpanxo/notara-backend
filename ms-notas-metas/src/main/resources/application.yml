server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ms-notas-metas

  datasource:
    url: jdbc:postgresql://postgres-notas-metas:5432/notara-notas-metas-db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}

  instance:
    hostname: ms-notas-metas
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info