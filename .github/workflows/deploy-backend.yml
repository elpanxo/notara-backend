name: Deploy Notara Backend
on:
  push:
    branches: [deploy]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin \
            495450559805.dkr.ecr.us-east-1.amazonaws.com

      - name: Build y Push ms-canciones
        run: |
          docker build -t 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-canciones:latest ./ms-canciones
          docker push 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-canciones:latest

      - name: Build y Push ms-usuarios
        run: |
          docker build -t 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-usuarios:latest ./ms-usuarios
          docker push 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-usuarios:latest

      - name: Build y Push ms-notas-metas
        run: |
          docker build -t 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-notas-metas:latest ./ms-notas-metas
          docker push 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-notas-metas:latest

      - name: Build y Push eureka-server
        run: |
          docker build -t 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-eureka:latest ./eureka-server
          docker push 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-eureka:latest

      - name: Build y Push api-gateway
        run: |
          docker build -t 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-api-gateway:latest ./api-gateway
          docker push 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-api-gateway:latest

      - name: Build y Push api-gateway001
        run: |
          docker build -t 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-api-gateway001:latest ./api-getaway-001
          docker push 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-api-gateway001:latest

      - name: Deploy en EC2 Backend via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --region us-east-1 \
            --parameters commands='[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 495450559805.dkr.ecr.us-east-1.amazonaws.com",
              "if [ ! -d /home/ec2-user/notara-backend ]; then git clone https://github.com/elpanxo/notara-backend.git /home/ec2-user/notara-backend; else cd /home/ec2-user/notara-backend && git fetch origin && git reset --hard origin/deploy; fi",
              "cd /home/ec2-user/notara-backend",
              "echo DATA_EC2_IP=${{ secrets.DATA_EC2_IP }} > .env",
              "echo JWT_SECRET=${{ secrets.JWT_SECRET }} >> .env",
              "echo JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} >> .env",
              "echo SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }} >> .env",
              "echo SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }} >> .env",
              "docker-compose down || true",
              "docker-compose up -d --pull always"
            ]'

      - name: Verificar estado
        run: |
          sleep 30
          aws ssm list-command-invocations \
            --instance-id "${{ secrets.EC2_BACKEND_INSTANCE_ID }}" \
            --details \
            --region us-east-1 \
            --query "CommandInvocations[0].CommandPlugins[0].{Status:Status,Output:Output}" \
            --output table --no-cli-pager
