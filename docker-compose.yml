version: '3.9'


services:

  ms-usuarios:
    build: ./ms-usuarios
    container_name: notara-ms-usuarios
    ports:
      - '8081:8081'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-usuarios:5432/notara-usuarios-db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SERVER_PORT=8081
      - EUREKA_URL=http://eureka-server:8761/eureka
    depends_on:
      postgres-usuarios:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - notara-internal
    restart: unless-stopped

  ms-canciones:
    build: ./ms-canciones
    container_name: notara-ms-canciones
    ports:
      - '3002:3002'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/linguaflow
      - REDIS_URL=redis://redis:6379
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - MS_CANCIONES_PORT=3002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notara-internal
    restart: unless-stopped

  ms-notas-metas:
    build: ./ms-notas-metas
    container_name: notara-ms-notas-metas
    ports:
      - '8083:8083'
    environment:
      - SERVER_PORT=8083
      - EUREKA_URL=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-notas-metas:5432/notara-notas-metas-db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      postgres-notas-metas:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - notara-internal
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: notara-gateway
    ports:
      - '3000:3000'
    environment:
      - MS_USUARIOS_URL=http://ms-usuarios:8081
      - MS_CANCIONES_URL=http://ms-canciones:3002
      - API_GATEWAY_PORT=3000
    depends_on:
      - ms-usuarios
      - ms-canciones
    networks:
      - notara-internal
    restart: unless-stopped

  api-gateway001:
    build: ./api-getaway-001
    ports:
      - "8086:8086"
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
      ms-usuarios:
        condition: service_started
      ms-notas-metas:
        condition: service_started
    networks:
      - notara-internal
    restart: unless-stopped


  #-------------------------------servidor de eureka----------------------------------------------
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - notara-internal
    restart: unless-stopped

volumes:
  postgres_usuarios_data:
  postgres_notas_metas_data:
  mongo_data:
  redis_data:

networks:
  notara-internal:
    driver: bridge
