version: '3.9'
services:
  ms-usuarios:
    image: 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-usuarios:latest
    container_name: notara-ms-usuarios
    ports:
      - '8081:8081'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DATA_EC2_IP}:5432/notara-usuarios-db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - REDIS_URL=redis://${DATA_EC2_IP}:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SERVER_PORT=8081
      - EUREKA_URL=http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - notara-internal
    restart: unless-stopped

  ms-canciones:
    image: 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-canciones:latest
    container_name: notara-ms-canciones
    ports:
      - '3002:3002'
    environment:
      - MONGODB_URI=mongodb://${DATA_EC2_IP}:27017/linguaflow
      - REDIS_URL=redis://${DATA_EC2_IP}:6379
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - MS_CANCIONES_PORT=3002
    networks:
      - notara-internal
    restart: unless-stopped

  ms-notas-metas:
    image: 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-ms-notas-metas:latest
    container_name: notara-ms-notas-metas
    ports:
      - '8083:8083'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DATA_EC2_IP}:5432/notara-notas-metas-db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SERVER_PORT=8083
      - EUREKA_URL=http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - notara-internal
    restart: unless-stopped

  api-gateway:
    image: 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-api-gateway:latest
    container_name: notara-gateway
    ports:
      - '3000:3000'
    environment:
      - MS_USUARIOS_URL=http://ms-usuarios:8081
      - MS_CANCIONES_URL=http://ms-canciones:3002
      - API_GATEWAY_PORT=3000
    depends_on:
      - ms-usuarios
      - ms-canciones
    networks:
      - notara-internal
    restart: unless-stopped

  api-gateway001:
    image: 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-api-gateway001:latest
    ports:
      - "8086:8086"
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka
      - MS_USUARIOS_URL=http://ms-usuarios:8081
      - MS_NOTAS_METAS_URL=http://ms-notas-metas:8083
    depends_on:
      - eureka-server
      - ms-usuarios
      - ms-notas-metas
    networks:
      - notara-internal
    restart: unless-stopped

  eureka-server:
    image: 495450559805.dkr.ecr.us-east-1.amazonaws.com/notara-eureka:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8761/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - notara-internal
    restart: unless-stopped

networks:
  notara-internal:
    driver: bridge
